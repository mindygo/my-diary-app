<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary Polisher Pro - 英文日记精修助手</title>
    <!-- 引入 React, Babel 和 Tailwind CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-card { border: 2px solid #f1f5f9 !important; border-radius: 1.5rem !important; padding: 2rem !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#FDFDFE] text-slate-900 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        // 由于 CDN 环境，我们手动映射 Lucide 图标
        const Icon = ({ name, className }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                const icon = lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const CEFR_LEVELS = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
        const HIGHLIGHT_TYPES = {
            collocation: { color: 'bg-blue-100 text-blue-800 border-blue-200', label: '固定搭配', icon: '🔵' },
            structure: { color: 'bg-yellow-100 text-yellow-800 border-yellow-200', label: '精彩句型', icon: '🟡' },
            phrase: { color: 'bg-emerald-100 text-emerald-800 border-emerald-200', label: '核心词组', icon: '🟢' }
        };

        const App = () => {
            const [inputText, setInputText] = useState('');
            const [targetLevel, setTargetLevel] = useState('B2');
            const [isProcessing, setIsProcessing] = useState(false);
            const [result, setResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [view, setView] = useState('editor');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);

            // 这里放你的 API KEY
            const apiKey = ""; 

            useEffect(() => {
                const saved = localStorage.getItem('diary_polisher_v6');
                if (saved) setHistory(JSON.parse(saved));
                lucide.createIcons();
            }, [view, result]);

            const stats = useMemo(() => {
                const totalWords = history.reduce((acc, h) => acc + (h.original?.trim().split(/\s+/).length || 0), 0);
                const totalHighlights = history.reduce((acc, h) => acc + (h.highlights?.length || 0), 0);
                return { totalDays: history.length, totalWords, totalHighlights };
            }, [history]);

            const polishDiary = async () => {
                if (!inputText.trim()) return;
                setIsProcessing(true);
                const systemPrompt = `You are a professional English tutor. Analyze diary and rewrite to ${targetLevel}. Identify 8-15 highlights. Explain in CHINESE. Return JSON ONLY.`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Original Draft: ${inputText}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const resJson = JSON.parse(data.candidates[0].content.parts[0].text);
                    setResult(resJson);
                    const newEntry = { date: selectedDate, original: inputText, polished: resJson.polished_text, highlights: resJson.highlights, feedback: resJson.feedback, level: resJson.original_level, target: targetLevel };
                    const updated = [newEntry, ...history.filter(h => h.date !== selectedDate)];
                    setHistory(updated);
                    localStorage.setItem('diary_polisher_v6', JSON.stringify(updated));
                } catch (e) { console.error(e); }
                finally { setIsProcessing(false); }
            };

            return (
                <div className="min-h-screen">
                    {/* 导航栏 */}
                    <nav className="bg-white border-b px-8 py-4 flex items-center justify-between sticky top-0 z-50 no-print">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-lg"><Icon name="sparkles" className="text-white w-6 h-6" /></div>
                            <h1 className="font-black text-xl tracking-tighter">Diary Polisher Pro</h1>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setView('editor')} className={`px-4 py-2 rounded-lg text-sm font-bold ${view === 'editor' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>写作润色</button>
                            <button onClick={() => setView('history')} className={`px-4 py-2 rounded-lg text-sm font-bold ${view === 'history' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>历史记录</button>
                        </div>
                        <div className="flex items-center gap-4 text-sm font-bold">
                            <span className="text-slate-400 uppercase tracking-widest text-[10px]">Total Words:</span>
                            <span className="text-indigo-600">{stats.totalWords}</span>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-6 lg:p-12">
                        {view === 'editor' ? (
                            <div className="space-y-8">
                                <header className="flex justify-between items-end no-print">
                                    <div><h2 className="text-3xl font-black">Hi, 准备好精修了吗？</h2></div>
                                    <div className="flex gap-4 items-center bg-white p-2 border rounded-2xl">
                                        <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="text-sm font-bold border-none focus:ring-0" />
                                        <select value={targetLevel} onChange={e => setTargetLevel(e.target.value)} className="text-sm font-bold text-indigo-600 border-none focus:ring-0 bg-transparent">
                                            {CEFR_LEVELS.slice(2).map(l => <option key={l} value={l}>{l} Level</option>)}
                                        </select>
                                    </div>
                                </header>

                                <div className="grid lg:grid-cols-2 gap-8">
                                    {/* 原稿 */}
                                    <div className="flex flex-col min-h-[500px] bg-white rounded-[2.5rem] border shadow-sm no-print">
                                        <div className="px-6 py-4 border-b text-xs font-black text-slate-400 uppercase tracking-widest">My Draft</div>
                                        <textarea value={inputText} onChange={e => setInputText(e.target.value)} className="flex-1 p-8 text-lg border-none focus:ring-0 resize-none" placeholder="输入你的英文日记..." />
                                        <div className="p-6 flex justify-end">
                                            <button onClick={polishDiary} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-sm hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all">
                                                {isProcessing ? '润色中...' : '提交精修'}
                                            </button>
                                        </div>
                                    </div>

                                    {/* 打印版 PDF 合并区域 */}
                                    <div className="flex flex-col min-h-[500px] bg-white rounded-[2.5rem] border-2 border-indigo-50 shadow-xl overflow-hidden print-card">
                                        {/* 打印专用头 */}
                                        <div className="hidden print:block p-8 border-b-4 border-indigo-600 bg-indigo-50">
                                            <h1 className="text-3xl font-black">英语日记学习报告</h1>
                                            <p className="font-bold opacity-60">Diary Polisher Pro | {selectedDate}</p>
                                        </div>

                                        <div className="p-8 flex-1 overflow-y-auto">
                                            {isProcessing ? <div className="h-full flex items-center justify-center font-bold text-slate-300">正在智能分析...</div> : 
                                            result ? (
                                                <div className="space-y-10">
                                                    <div className="text-xl leading-relaxed text-slate-800">
                                                        {result.polished_text}
                                                    </div>
                                                    <div className="space-y-4">
                                                        <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest">学习重点</h4>
                                                        <div className="grid gap-4">
                                                            {result.highlights.map((hl, i) => (
                                                                <div key={i} className={`p-5 rounded-2xl border-2 ${HIGHLIGHT_TYPES[hl.type]?.color}`}>
                                                                    <div className="font-black text-lg">{hl.text}</div>
                                                                    <div className="text-xs font-bold opacity-70 mt-1">{hl.explanation}</div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div className="p-8 bg-slate-900 rounded-[2rem] text-white">
                                                        <h4 className="text-xs font-black uppercase tracking-widest mb-4 opacity-50">导师评语</h4>
                                                        <p className="font-bold text-lg">{result.feedback}</p>
                                                    </div>
                                                </div>
                                            ) : <div className="h-full flex items-center justify-center font-bold text-slate-200">等待精修...</div>}
                                        </div>
                                        {result && (
                                            <div className="p-6 border-t bg-slate-50 flex justify-end no-print">
                                                <button onClick={() => window.print()} className="text-xs font-black text-slate-500 flex items-center gap-2 hover:text-indigo-600">
                                                    <Icon name="printer" className="w-4 h-4" /> 导出报告 PDF
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-7 gap-4">
                                {/* 这里可以进一步开发日历，目前显示记录列表 */}
                                {history.map((h, i) => (
                                    <div key={i} onClick={() => {setInputText(h.original); setResult({polished_text: h.polished, highlights: h.highlights, feedback: h.feedback, original_level: h.level}); setView('editor');}} className="p-6 bg-white border rounded-2xl cursor-pointer hover:border-indigo-600 transition-all">
                                        <div className="font-black text-indigo-600 mb-2">{h.date}</div>
                                        <p className="text-xs text-slate-400 line-clamp-2 italic">{h.polished}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
